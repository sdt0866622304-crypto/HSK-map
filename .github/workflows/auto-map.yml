name: Auto Markmap

on:
  push:
    branches:
      - main
    paths:
      - 'HSK v2.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Tai ma nguon
        uses: actions/checkout@v4

      - name: Cai dat moi truong
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cai dat cong cu Markmap
        run: npm install -g markmap-cli

      - name: Xuat file HTML
        run: markmap "HSK v2.md" -o index.html --no-open

      - name: Luu va day file HTML len mây
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Tu dong tao index.html [skip ci]" || echo "Khong co thay doi"
          git push